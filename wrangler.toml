name = "r2file"
main = "src/index.js"
compatibility_date = "2025-08-16"

# 启用 workers.dev
workers_dev = true

# 绑定域名
routes = [
    { pattern = "eeew.eu.org", custom_domain = true }
]

# R2 存储桶绑定
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "media"

# 环境变量
[vars]
MAX_UPLOAD_SIZE = "53687091200"
MAX_AGE = "86400"
SHORT_URL_SERVICE = "https://suosuo.de/short"
PASSWORD = ""
MAX_AGE_FOR_MULTIDOWNLOAD = "86400"
NO_CLEANUP = "false"

# 静态文件
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/*"]

# 开启日志
[observability.logs]
enabled = true

# 定时任务 - 每 5 分钟执行一次清理
[triggers]
crons = ["*/5 * * * *"]
